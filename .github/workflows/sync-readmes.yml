name: Sync README from Project

on:
  repository_dispatch:
    types: [readme-updated]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync README
        env:
          REPO: ${{ github.event.client_payload.repo }}
        run: |
          # Determine category and readme path from sync-config.json
          # Supports both string values ("category") and object values ({ category, readmePath })
          PARSED=$(node -e "
            const config = require('./sync-config.json');
            const entry = config[process.env.REPO];
            if (!entry) { console.error('Repo not in sync-config.json:', process.env.REPO); process.exit(1); }
            const category = typeof entry === 'string' ? entry : entry.category;
            const readmePath = typeof entry === 'string' ? 'README.md' : (entry.readmePath || 'README.md');
            console.log(category + '|' + readmePath);
          ")
          CATEGORY=$(echo "$PARSED" | cut -d'|' -f1)
          README_PATH=$(echo "$PARSED" | cut -d'|' -f2)

          echo "Syncing $REPO → $CATEGORY (path: $README_PATH)"

          # Fetch README — try main, master, desarrollo branches
          AUTH_HEADER="Authorization: token ${{ secrets.WIKI_SYNC_TOKEN }}"
          CONTENT=$(curl -sf -H "$AUTH_HEADER" "https://raw.githubusercontent.com/bruno-avila21/${REPO}/main/${README_PATH}" || \
                    curl -sf -H "$AUTH_HEADER" "https://raw.githubusercontent.com/bruno-avila21/${REPO}/master/${README_PATH}" || \
                    curl -sf -H "$AUTH_HEADER" "https://raw.githubusercontent.com/bruno-avila21/${REPO}/desarrollo/${README_PATH}" || \
                    echo "")

          if [ -z "$CONTENT" ]; then
            echo "No README.md found in $REPO at $README_PATH, skipping"
            exit 0
          fi

          # Inject Starlight frontmatter if missing
          FIRST_LINE=$(echo "$CONTENT" | head -1)
          if [ "$FIRST_LINE" = "---" ]; then
            FINAL_CONTENT="$CONTENT"
          else
            REPO_TITLE=$(echo "$REPO" | tr '-' ' ' | sed 's/\b\(.\)/\u\1/g')
            FINAL_CONTENT=$(printf '%s\n%s\n%s\n%s\n\n%s' '---' "title: $REPO_TITLE" "description: Documentación de $REPO" '---' "$CONTENT")
          fi

          # Write file to correct category
          TARGET_DIR="src/content/docs/$CATEGORY"
          mkdir -p "$TARGET_DIR"
          FILENAME=$(echo "$REPO" | tr '[:upper:]' '[:lower:]' | tr ' ' '-')

          # Skip if page is manually managed (wiki_managed: true in frontmatter)
          TARGET_FILE="$TARGET_DIR/${FILENAME}.md"
          if [ -f "$TARGET_FILE" ] && grep -q "wiki_managed: true" "$TARGET_FILE"; then
            echo "Skipping $REPO — wiki_managed: true"
            exit 0
          fi

          printf '%s\n' "$FINAL_CONTENT" > "$TARGET_FILE"

          # Commit if there are changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[sync] update $REPO README"
            git pull --rebase
            git push
          fi
